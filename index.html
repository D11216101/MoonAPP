<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>月語 Moon Whisper - 維運管理中心</title>
    <style>
        :root { --primary: #6a4c93; --bg: #f4f7f6; --white: #ffffff; --danger: #d63031; --success: #27ae60; }
        
        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 20px;
            color: #333;
        }

        /* 頂部標題列 */
        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 10px 0;
            border-bottom: 2px solid var(--primary);
        }
        .logo-title { font-size: 28px; font-weight: bold; color: var(--primary); display: flex; align-items: center; gap: 10px; }

        /* 數據小卡排版 */
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 20px; 
            margin-bottom: 25px; 
        }
        .stat-card { 
            background: var(--white); 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            text-align: center; 
        }
        .stat-card h4 { margin: 0; color: #777; font-size: 14px; }
        .stat-card .num { font-size: 32px; font-weight: bold; color: var(--primary); margin: 10px 0; }

        /* 功能卡片 */
        .card { 
            background: var(--white); 
            border-radius: 12px; 
            padding: 25px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            margin-bottom: 25px; 
        }
        h3 { margin-top: 0; border-left: 6px solid var(--primary); padding-left: 15px; font-size: 20px; margin-bottom: 20px; }

        /* 表格樣式 */
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 15px; border-bottom: 1px solid #eee; font-size: 15px; }
        th { background: #fcfaff; color: #555; }

        /* 按鈕樣式 */
        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; transition: 0.3s; font-weight: bold; }
        .btn-backup { background: var(--success); color: white; padding: 12px 24px; font-size: 16px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-warn { background: #f39c12; color: white; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        .system-info { text-align: center; color: #999; font-size: 13px; margin-top: 40px; padding-bottom: 20px; }
    </style>
</head>
<body>

    <div class="top-header">
        <div class="logo-title">🌙 月語 Moon Whisper 管理維運中心</div>
        <button class="btn btn-backup" onclick="alert('全站資料備份成功！')">📥 一鍵備份全站數據</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><h4>總使用者</h4><div class="num">1,284</div></div>
        <div class="stat-card"><h4>今日活躍</h4><div class="num">356</div></div>
        <div class="stat-card"><h4>AI 諮詢量</h4><div class="num">8,942</div></div>
        <div class="stat-card" style="border-bottom: 4px solid var(--danger);">
            <h4>待處理異常</h4><div class="num" style="color:var(--danger)">5</div>
        </div>
    </div>

    <div class="card">
        <h3>🧠 RAG 知識庫優化 (AI 置信度監控)</h3>
        <table>
            <thead>
                <tr><th>使用者提問內容</th><th>AI 匹配得分</th><th>建議操作</th></tr>
            </thead>
            <tbody>
                <tr>
                    <td>「流感疫苗會導致經期提前嗎？」</td>
                    <td style="color:var(--danger); font-weight:bold;">42% (信心低)</td>
                    <td><button class="btn btn-primary">＋ 補充醫學百科資料</button></td>
                </tr>
                <tr>
                    <td>「心率高於 100 且持續 2 小時...」</td>
                    <td style="color:var(--danger); font-weight:bold;">35% (信心低)</td>
                    <td><button class="btn btn-primary">＋ 新增異常指引手冊</button></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="card">
        <h3>👥 使用者管理與帳號救援</h3>
        <table>
            <thead>
                <tr><th>UID</th><th>最後同步時間</th><th>當前生理階段</th><th>快速操作</th></tr>
            </thead>
            <tbody>
                <tr>
                    <td>U_8821</td>
                    <td>3 分鐘前</td>
                    <td>黃體期</td>
                    <td>
                        <button class="btn btn-warn" onclick="alert('已發送重設連結至信箱！')">🔑 密碼救援</button>
                        <button class="btn" style="background:#eee" onclick="alert('CSV 匯出中...')">💾 數據匯出</button>
                    </td>
                </tr>
                <tr>
                    <td>U_9012</td>
                    <td>剛剛</td>
                    <td>行經期</td>
                    <td>
                        <button class="btn btn-warn" onclick="alert('已發送重設連結至信箱！')">🔑 密碼救援</button>
                        <button class="btn" style="background:#eee" onclick="alert('CSV 匯出中...')">💾 數據匯出</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="system-info">
        伺服器節點：Llama 3 (Ollama) | 同步頻率：每 5 分鐘一次 | 系統狀態：● 正常運行
    </div>

</body>
</html>
