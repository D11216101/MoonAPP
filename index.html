<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>月語 Moon Whisper - 管理維運中心</title>
    <style>
        :root { --primary: #6a4c93; --bg: #f4f7f6; --white: #ffffff; --danger: #d63031; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 220px; background: #2d3436; color: white; padding: 20px; display: flex; flex-direction: column; }
        .logo { font-size: 22px; font-weight: bold; margin-bottom: 40px; text-align: center; border-bottom: 1px solid #444; padding-bottom: 15px; }
        .menu-item { padding: 15px; cursor: pointer; border-radius: 6px; margin-bottom: 5px; }
        .active { background: var(--primary); }
        .main { flex: 1; padding: 25px; overflow-y: auto; }
        .header-row { display: flex; justify-content: space-between; margin-bottom: 25px; gap: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; flex: 1; }
        .stat-card { background: var(--white); padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: center; }
        .stat-card .num { font-size: 26px; font-weight: bold; color: var(--primary); }
        .btn-backup { background: #27ae60; color: white; border: none; padding: 15px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .card { background: var(--white); border-radius: 10px; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 25px; }
        h3 { margin-top: 0; border-left: 5px solid var(--primary); padding-left: 12px; font-size: 18px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        .btn { padding: 6px 12px; border-radius: 4px; border: 1px solid #ddd; cursor: pointer; font-size: 12px; }
        .btn-primary { background: var(--primary); color: white; border: none; }
        .btn-warn { background: #f39c12; color: white; border: none; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">🌙 月語 Admin</div>
        <div class="menu-item active">📊 維運儀表板</div>
        <div style="margin-top: auto; font-size: 12px; color: #888;">伺服器：Llama 3 (Ollama)<br>同步頻率：5 分鐘/次</div>
    </div>
    <div class="main">
        <div class="header-row">
            <div class="stats-grid">
                <div class="stat-card"><h4>總使用者</h4><div class="num">1,284</div></div>
                <div class="stat-card"><h4>今日活躍</h4><div class="num">356</div></div>
                <div class="stat-card"><h4>AI 諮詢量</h4><div class="num">8,942</div></div>
                <div class="stat-card" style="border: 1px solid var(--danger);"><h4>待處理異常</h4><div class="num" style="color:var(--danger)">5</div></div>
            </div>
            <button class="btn-backup" onclick="alert('備份成功！')">📥 一鍵備份全站數據</button>
        </div>
        <div class="card">
            <h3>🧠 RAG 知識庫優化 (AI 信心分數過低監測)</h3>
            <table>
                <tr><th>提問內容</th><th>AI 置信度</th><th>管理操作</th></tr>
                <tr><td>流感疫苗會導致經期提前嗎？</td><td style="color:red; font-weight:bold;">42%</td><td><button class="btn btn-primary">＋ 新增資料</button></td></tr>
            </table>
        </div>
        <div class="card">
            <h3>👥 使用者管理與帳號救援</h3>
            <table>
                <tr><th>UID</th><th>最後同步</th><th>管理操作</th></tr>
                <tr><td>U_8821</td><td>3 分鐘前</td><td>
                    <button class="btn btn-warn" onclick="alert('密碼重設郵件已發送！')">🔑 帳密救援</button>
                    <button class="btn" onclick="alert('已匯出 CSV')">💾 匯出</button>
                </td></tr>
            </table>
        </div>
    </div>
</body>
</html>
